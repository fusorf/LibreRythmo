# Build des installeurs (Windows NSIS + macOS DMG) via electron-builder :
#  - à chaque tag `v*` poussé → build sur les 3 plateformes + GitHub Release avec les installeurs
#  - déclenchement manuel (workflow_dispatch) → artefacts téléchargeables, sans release
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-13, macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # le paquet .pacman (Arch) via fpm a besoin de bsdtar (libarchive-tools)
      - name: Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      # Windows : installeur NSIS + zip portable ; macOS : DMG (arch native du runner —
      # macos-13 = Intel x64, macos-14 = Apple Silicon arm64). Builds non signés.
      - name: Build installer
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LibreRythmo-${{ matrix.os }}
          path: |
            dist-installer/*.exe
            dist-installer/*.dmg
            dist-installer/*.zip
            dist-installer/*.AppImage
            dist-installer/*.deb
            dist-installer/*.pacman
          if-no-files-found: ignore

      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-installer/*.exe
            dist-installer/*.dmg
            dist-installer/*.zip
            dist-installer/*.AppImage
            dist-installer/*.deb
            dist-installer/*.pacman
          fail_on_unmatched_files: false
          generate_release_notes: true
