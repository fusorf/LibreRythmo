# Build Windows portable et publication automatique :
#  - à chaque tag `v*` poussé → build + zip + GitHub Release avec l'artefact
#  - déclenchement manuel possible (workflow_dispatch) → artefact téléchargeable
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package portable build
        run: npm run package

      - name: Zip portable build
        run: Compress-Archive -Path dist/LibreRythmo-win32-x64 -DestinationPath LibreRythmo-win32-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibreRythmo-win32-x64
          path: LibreRythmo-win32-x64.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LibreRythmo-win32-x64.zip
          generate_release_notes: true
